<title>Daily Quartet</title>
<style>
:root{--bg:#0e1116;--surface:#181c24;--surface-2:#232936;--border:#2c3340;--text:#e8eaee;--muted:#8c93a3;--accent:#ffb02e;--accent-soft:#ffb02e22;--correct:#4ade80;--wrong:#ef4444}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;overscroll-behavior:none;-webkit-user-select:none;user-select:none}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.app{max-width:480px;margin:0 auto;padding:12px 14px 24px;min-height:100%;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.title{font-weight:800;font-size:17px;letter-spacing:.8px}
.title .a{color:var(--accent)}
.icon-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;cursor:pointer;min-height:36px}
.icon-btn:active{background:var(--surface-2)}
.date-strip{display:flex;align-items:center;justify-content:center;gap:4px;color:var(--muted);margin-bottom:12px;font-size:13px}
.date-strip button{background:none;border:none;color:var(--muted);font-size:22px;padding:4px 12px;cursor:pointer;line-height:1}
.date-strip button:disabled{opacity:.3;cursor:not-allowed}
.current-date{color:var(--text);font-weight:600;min-width:170px;text-align:center}
.theme-tag{display:inline-block;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:999px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin-left:6px}
.theme-tag.revealed{color:var(--accent);border-color:var(--accent)}
.solved-section{margin-bottom:12px;min-height:8px}
.solved-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.solved-word{background:var(--surface);border:1px solid var(--correct);color:var(--correct);padding:5px 11px;border-radius:999px;font-weight:700;font-size:12px;letter-spacing:.6px;text-transform:uppercase;animation:pop .4s ease-out}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:8px 0 14px}
.tile{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(13px,4.2vw,17px);cursor:pointer;transition:transform .12s,background .12s,border-color .12s,opacity .35s;text-transform:lowercase;letter-spacing:.3px;padding:2px}
.tile:active{transform:scale(.94)}
.tile.sel{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.tile.gone{opacity:0;pointer-events:none;transform:scale(.3)}
.tile.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.actions{display:flex;gap:7px;margin-bottom:10px}
.btn{flex:1;padding:13px 8px;border-radius:11px;border:none;font-weight:700;font-size:14px;cursor:pointer;min-height:46px;font-family:inherit}
.btn-primary{background:var(--accent);color:#1a1206}
.btn-primary:disabled{background:var(--surface-2);color:var(--muted);cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 28px);left:50%;transform:translateX(-50%) translateY(24px);background:var(--surface-2);color:var(--text);padding:11px 18px;border-radius:999px;font-size:13px;border:1px solid var(--border);opacity:0;pointer-events:none;transition:all .3s;z-index:100;font-weight:600}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--wrong);color:var(--wrong)}
.toast.ok{border-color:var(--correct);color:var(--correct)}
.complete{background:linear-gradient(135deg,var(--accent),#ff8a3d);color:#1a1206;padding:14px;border-radius:12px;text-align:center;margin-bottom:10px;animation:pop .5s}
.complete h2{margin:0 0 4px;font-size:17px}
.complete p{margin:0;font-size:13px;opacity:.9}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:16px;max-width:360px;width:100%;padding:16px;border:1px solid var(--border)}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-t{font-weight:700;font-size:16px}
.modal-x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:0 6px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-nav button{background:var(--surface-2);border:none;color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px}
.cal-month{font-weight:700;font-size:15px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;color:var(--muted);text-align:center;padding:4px 0;font-weight:600}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;position:relative;font-size:13px;background:var(--surface-2);font-weight:500}
.cal-cell:active{background:var(--border)}
.cal-cell.empty{background:transparent;cursor:default}
.cal-cell.future{opacity:.25;cursor:not-allowed}
.cal-cell.today{box-shadow:inset 0 0 0 1px var(--accent)}
.cal-cell.current{background:var(--accent);color:#1a1206;font-weight:800}
.cal-cell .dot{position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%}
.cal-cell.done .dot{background:var(--correct)}
.cal-cell.partial .dot{background:var(--accent)}
.cal-cell.current .dot{display:none}
.hint{color:var(--muted);font-size:12px;text-align:center;margin-top:auto;padding-top:10px;line-height:1.5}
.sel-info{color:var(--muted);font-size:12px;text-align:center;margin-bottom:7px;min-height:16px;font-weight:500}
.sel-info.full{color:var(--accent)}
.stats{display:flex;justify-content:space-around;background:var(--surface);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.stat{text-align:center}
.stat-v{font-size:18px;font-weight:800;color:var(--accent)}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">DAILY <span class="a">QUARTET</span></div>
    <button class="icon-btn" id="cal-btn">📅 Calendar</button>
  </header>
  <div class="date-strip">
    <button id="prev-day">‹</button>
    <div class="current-date" id="current-date"></div>
    <button id="next-day">›</button>
  </div>
  <div id="banner-slot"></div>
  <div class="solved-section"><div class="solved-row" id="solved-row"></div></div>
  <div class="grid" id="grid"></div>
  <div class="sel-info" id="sel-info">Tap tiles to select fragments</div>
  <div class="actions">
    <button class="btn btn-secondary" id="undo-btn" disabled>↶ Undo</button>
    <button class="btn btn-secondary" id="clear-btn" disabled>Clear</button>
    <button class="btn btn-primary" id="submit-btn" disabled>Submit</button>
  </div>
  <div class="hint" id="hint">Find 5 hidden words. Each is made of exactly 4 fragments.<br>Order doesn't matter — the app figures it out.</div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="cal-modal">
  <div class="modal">
    <div class="modal-h"><div class="modal-t">Calendar</div><button class="modal-x" id="cal-close">×</button></div>
    <div class="cal-nav"><button id="cal-prev">‹</button><div class="cal-month" id="cal-month"></div><button id="cal-next">›</button></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

/* Drop placeholder puzzles (the last two are intentionally invalid - filter them) */
const PUZZLES=P.filter(p=>p.w.every(w=>w.length===4 && !w.includes("x")));

/* ============= STORAGE (graceful) ============= */
const STORE={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};

/* ============= DATE & SEED ============= */
function dateKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function parseKey(k){const[y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d)}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function shuffleSeeded(arr,seed){const r=mulberry32(seed);const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

/* ============= PUZZLE GEN ============= */
function getPuzzle(dateK){
  const h=hashStr(dateK);
  const idx=h%PUZZLES.length;
  const base=PUZZLES[idx];
  const flat=[];
  base.w.forEach((w,wi)=>w.forEach((f,fi)=>flat.push({frag:f,word:wi,pos:fi})));
  const tiles=shuffleSeeded(flat,h^0xABCDEF);
  return{theme:base.t,words:base.w,wordStrs:base.w.map(w=>w.join("")),tiles}
}

/* ============= PERMUTATIONS ============= */
function perms(arr){
  if(arr.length<=1)return[arr];
  const r=[];
  for(let i=0;i<arr.length;i++){
    const rest=arr.slice(0,i).concat(arr.slice(i+1));
    for(const p of perms(rest))r.push([arr[i],...p])
  }
  return r
}

/* ============= STATE ============= */
let curDate=new Date();
curDate.setHours(0,0,0,0);
let curKey=dateKey(curDate);
let puzzle=null;
let progress=null;
let selected=[];
let lastWrong=null;
let calCursor=new Date(curDate.getFullYear(),curDate.getMonth(),1);

function loadProgress(key){
  const p=STORE.get("q-"+key);
  return p||{solvedWords:[],solvedTiles:[],wrongCount:0,done:false}
}
function saveProgress(){
  STORE.set("q-"+curKey,progress);
  const all=STORE.get("q-index")||{};
  all[curKey]={d:progress.done,p:progress.solvedWords.length};
  STORE.set("q-index",all);
}

/* ============= RENDER ============= */
const $=id=>document.getElementById(id);

function formatDate(d){
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  const opts={weekday:"short",month:"short",day:"numeric"};
  let label=d.toLocaleDateString("en-US",opts);
  if(diff===0)label="Today · "+label;
  else if(diff===-1)label="Yesterday · "+label;
  else if(diff===1)label="Tomorrow · "+label;
  return label
}

function renderDate(){
  $("current-date").textContent=formatDate(curDate);
  const today=new Date();today.setHours(0,0,0,0);
  $("next-day").disabled=curDate>=today;
}

function renderGrid(){
  const g=$("grid");
  g.innerHTML="";
  puzzle.tiles.forEach((tile,i)=>{
    const el=document.createElement("div");
    el.className="tile";
    el.textContent=tile.frag;
    el.dataset.i=i;
    if(progress.solvedTiles.includes(i))el.classList.add("gone");
    if(selected.includes(i))el.classList.add("sel");
    el.addEventListener("click",()=>toggleTile(i));
    g.appendChild(el);
  });
}

function renderSolved(){
  const r=$("solved-row");
  r.innerHTML="";
  progress.solvedWords.forEach(wi=>{
    const el=document.createElement("div");
    el.className="solved-word";
    el.textContent=puzzle.wordStrs[wi];
    r.appendChild(el);
  });
}

function renderBanner(){
  const b=$("banner-slot");
  b.innerHTML="";
  if(progress.done){
    const el=document.createElement("div");
    el.className="complete";
    el.innerHTML="<h2>🎉 Complete!</h2><p>Theme: <strong>"+puzzle.theme+"</strong> · "+progress.wrongCount+" wrong guess"+(progress.wrongCount===1?"":"es")+"</p>";
    b.appendChild(el);
  }
}

function renderControls(){
  const n=selected.length;
  const info=$("sel-info");
  if(progress.done){info.textContent="Puzzle complete!";info.classList.remove("full")}
  else if(n===0){info.textContent="Tap tiles to select fragments";info.classList.remove("full")}
  else if(n<4){info.textContent="Selected "+n+"/4";info.classList.remove("full")}
  else{info.textContent="Ready to submit!";info.classList.add("full")}
  $("submit-btn").disabled=n!==4||progress.done;
  $("clear-btn").disabled=n===0||progress.done;
  $("undo-btn").disabled=!lastWrong||progress.done;
}

function render(){renderDate();renderGrid();renderSolved();renderBanner();renderControls()}

function loadDate(key){
  curKey=key;
  curDate=parseKey(key);
  puzzle=getPuzzle(curKey);
  progress=loadProgress(curKey);
  selected=[];
  lastWrong=null;
  render();
}

/* ============= GAMEPLAY ============= */
function toggleTile(i){
  if(progress.done)return;
  if(progress.solvedTiles.includes(i))return;
  const idx=selected.indexOf(i);
  if(idx>=0){selected.splice(idx,1)}
  else{if(selected.length>=4)return;selected.push(i)}
  lastWrong=null;
  render();
}

function checkSelection(){
  const frags=selected.map(i=>puzzle.tiles[i].frag);
  const allP=perms(frags);
  for(const p of allP){
    const joined=p.join("");
    for(let wi=0;wi<puzzle.wordStrs.length;wi++){
      if(puzzle.wordStrs[wi]===joined && !progress.solvedWords.includes(wi)){
        return wi;
      }
    }
  }
  return -1;
}

function showToast(msg,kind){
  const t=$("toast");
  t.className="toast show"+(kind?" "+kind:"");
  t.textContent=msg;
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove("show"),1800);
}

function submit(){
  if(selected.length!==4)return;
  const matched=checkSelection();
  if(matched>=0){
    progress.solvedWords.push(matched);
    progress.solvedTiles.push(...selected);
    if(progress.solvedWords.length===5)progress.done=true;
    selected=[];
    lastWrong=null;
    saveProgress();
    render();
    showToast(progress.done?"All words found! 🎉":"Correct! "+puzzle.wordStrs[matched].toUpperCase(),"ok");
  }else{
    lastWrong=selected.slice();
    progress.wrongCount++;
    saveProgress();
    document.querySelectorAll(".tile.sel").forEach(t=>{
      t.classList.add("shake");
      setTimeout(()=>t.classList.remove("shake"),400);
    });
    selected=[];
    setTimeout(()=>{render();showToast("Not quite — try again","err")},200);
  }
}

function clearSel(){selected=[];lastWrong=null;render()}
function undo(){if(lastWrong){selected=lastWrong.slice();lastWrong=null;render()}}

/* ============= NAVIGATION ============= */
function prevDay(){
  const d=new Date(curDate);d.setDate(d.getDate()-1);
  loadDate(dateKey(d));
}
function nextDay(){
  const today=new Date();today.setHours(0,0,0,0);
  if(curDate>=today)return;
  const d=new Date(curDate);d.setDate(d.getDate()+1);
  loadDate(dateKey(d));
}

/* ============= CALENDAR ============= */
function openCal(){
  calCursor=new Date(curDate.getFullYear(),curDate.getMonth(),1);
  renderCal();
  $("cal-modal").classList.add("open");
}
function closeCal(){$("cal-modal").classList.remove("open")}
function renderCal(){
  const m=$("cal-month");
  m.textContent=calCursor.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const g=$("cal-grid");
  g.innerHTML="";
  ["S","M","T","W","T","F","S"].forEach(d=>{const el=document.createElement("div");el.className="cal-dow";el.textContent=d;g.appendChild(el)});
  const first=new Date(calCursor.getFullYear(),calCursor.getMonth(),1);
  const offset=first.getDay();
  for(let i=0;i<offset;i++){const el=document.createElement("div");el.className="cal-cell empty";g.appendChild(el)}
  const lastDay=new Date(calCursor.getFullYear(),calCursor.getMonth()+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const idx=STORE.get("q-index")||{};
  for(let d=1;d<=lastDay;d++){
    const date=new Date(calCursor.getFullYear(),calCursor.getMonth(),d);
    const k=dateKey(date);
    const el=document.createElement("div");
    el.className="cal-cell";
    el.textContent=d;
    if(date>today)el.classList.add("future");
    else el.addEventListener("click",()=>{loadDate(k);closeCal()});
    if(date.getTime()===today.getTime())el.classList.add("today");
    if(k===curKey)el.classList.add("current");
    const st=idx[k];
    if(st){
      if(st.d)el.classList.add("done");
      else if(st.p>0)el.classList.add("partial");
      const dot=document.createElement("div");dot.className="dot";el.appendChild(dot);
    }
    g.appendChild(el);
  }
}
function calPrev(){calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()-1,1);renderCal()}
function calNext(){
  const today=new Date();const next=new Date(calCursor.getFullYear(),calCursor.getMonth()+1,1);
  if(next>new Date(today.getFullYear(),today.getMonth()+1,1))return;
  calCursor=next;renderCal();
}

/* ============= BIND ============= */
$("submit-btn").addEventListener("click",submit);
$("clear-btn").addEventListener("click",clearSel);
$("undo-btn").addEventListener("click",undo);
$("prev-day").addEventListener("click",prevDay);
$("next-day").addEventListener("click",nextDay);
$("cal-btn").addEventListener("click",openCal);
$("cal-close").addEventListener("click",closeCal);
$("cal-modal").addEventListener("click",e=>{if(e.target.id==="cal-modal")closeCal()});
$("cal-prev").addEventListener("click",calPrev);
$("cal-next").addEventListener("click",calNext);

/* ============= SERVICE WORKER ============= */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

/* ============= INIT ============= */
loadDate(curKey);
</script>
